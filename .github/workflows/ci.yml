# Intentionally minimal CI: validate build + tests for contributors and keep automation aligned with this template's clarity-first philosophy.
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 (LTS)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore DotnetCleanApiTemplate.sln

      - name: Build solution (Release)
        run: dotnet build DotnetCleanApiTemplate.sln --configuration Release --no-restore

      - name: Run tests (Release)
        run: dotnet test DotnetCleanApiTemplate.sln --configuration Release --no-build

      - name: Build API container image
        run: docker build -f DotnetCleanApiTemplate/Dockerfile -t dotnet-clean-api-template:ci .
