services:
  api:
    build:
      context: .
      dockerfile: DotnetCleanApiTemplate/Dockerfile
    container_name: dotnet-clean-api-template-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=clean_api_template_dev;Username=postgres;Password=postgres
      Jwt__SigningKey: local-dev-signing-key-at-least-32-chars
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: dotnet-clean-api-template-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clean_api_template_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
